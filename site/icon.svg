<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Permafrost icon">
  <defs>
    <linearGradient id="pg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#A5F3FC"/><stop offset="1" stop-color="#38BDF8"/>
    </linearGradient>
    <radialGradient id="pglow" cx=".5" cy=".5" r=".62">
      <stop offset="0" stop-color="#38BDF8" stop-opacity=".5"/><stop offset="1" stop-color="#38BDF8" stop-opacity="0"/>
    </radialGradient>
    <filter id="psoft" x="-40%" y="-40%" width="180%" height="180%"><feGaussianBlur stdDeviation="9"/></filter>
  </defs>
  <rect x="16" y="16" width="480" height="480" rx="104" fill="#0B1220"/>
  <rect x="16" y="16" width="480" height="480" rx="104" fill="url(#pglow)">
    <animate attributeName="opacity" values=".5;1;.5" dur="4s" repeatCount="indefinite"/>
  </rect>
  <!-- hex shield -->
  <path d="M256 62 L424 158 L424 354 L256 450 L88 354 L88 158 Z" fill="none" stroke="url(#pg)" stroke-width="26" stroke-linejoin="round">
    <animate attributeName="stroke-width" values="26;30;26" dur="4s" repeatCount="indefinite"/>
  </path>
  <!-- snowflake: 6 arms, slow crystalline rotation -->
  <g stroke="url(#pg)" stroke-width="20" stroke-linecap="round">
    <animateTransform attributeName="transform" type="rotate" from="0 256 256" to="60 256 256" dur="9s" repeatCount="indefinite"/>
    <path d="M256 136 V376"/>
    <path d="M152 196 L360 316"/>
    <path d="M152 316 L360 196"/>
    <path d="M256 136 L226 168 M256 136 L286 168" stroke-width="14"/>
    <path d="M256 376 L226 344 M256 376 L286 344" stroke-width="14"/>
  </g>
  <!-- core pulse -->
  <circle cx="256" cy="256" r="34" fill="url(#pg)" filter="url(#psoft)">
    <animate attributeName="r" values="30;40;30" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values=".6;1;.6" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="256" cy="256" r="22" fill="#EDF6FD"/>
  <!-- temperature ok tick arc -->
  <circle cx="256" cy="256" r="150" fill="none" stroke="#34D399" stroke-width="10" stroke-linecap="round"
          stroke-dasharray="70 872" transform="rotate(-90 256 256)">
    <animate attributeName="stroke-dashoffset" values="0;-942" dur="6s" repeatCount="indefinite"/>
  </circle>
</svg>
