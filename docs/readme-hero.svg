<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" role="img" aria-label="Permafrost — the $60 vaccine-fridge guardian that reasons before it screams">
  <defs>
    <radialGradient id="pbgA" cx="72%" cy="14%" r="55%">
      <stop offset="0" stop-color="#38BDF8" stop-opacity=".16"/><stop offset="1" stop-color="#38BDF8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="pbgB" cx="8%" cy="92%" r="50%">
      <stop offset="0" stop-color="#A5F3FC" stop-opacity=".08"/><stop offset="1" stop-color="#A5F3FC" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="pbrand" gradientUnits="userSpaceOnUse" x1="60" y1="0" x2="960" y2="0">
      <stop offset="0" stop-color="#EDF6FD"/><stop offset=".55" stop-color="#38BDF8"/><stop offset="1" stop-color="#A5F3FC"/>
      <animateTransform attributeName="gradientTransform" type="translate" values="-260 0;260 0;-260 0" dur="7s" repeatCount="indefinite"/>
    </linearGradient>
    <filter id="pblur14" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="14"/></filter>
    <filter id="pblur3"><feGaussianBlur stdDeviation="3"/></filter>
    <pattern id="pgrid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" fill="none" stroke="#EDF6FD" stroke-opacity=".05" stroke-width="1"/>
    </pattern>
    <style>
      .disp { font-family: -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
      .mono { font-family: ui-monospace, 'SF Mono', Menlo, Consolas, monospace; }
    </style>
  </defs>

  <rect width="1280" height="640" fill="#0B1220"/>
  <rect width="1280" height="640" fill="url(#pbgA)"><animate attributeName="opacity" values=".7;1;.7" dur="5s" repeatCount="indefinite"/></rect>
  <rect width="1280" height="640" fill="url(#pbgB)"/>
  <g><rect x="-48" y="-48" width="1376" height="736" fill="url(#pgrid)"/>
    <animateTransform attributeName="transform" type="translate" from="0 0" to="48 48" dur="5s" repeatCount="indefinite"/></g>

  <!-- falling snow -->
  <g fill="#A5F3FC">
    <circle cx="180" cy="0" r="3" opacity="0"><animate attributeName="cy" values="-10;660" dur="9s" repeatCount="indefinite"/><animate attributeName="cx" values="180;220;180" dur="9s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;.6;.6;0" keyTimes="0;.1;.9;1" dur="9s" repeatCount="indefinite"/></circle>
    <circle cx="520" cy="0" r="2.2" opacity="0"><animate attributeName="cy" values="-10;660" dur="11s" begin="2s" repeatCount="indefinite"/><animate attributeName="cx" values="520;490;520" dur="11s" begin="2s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;.5;.5;0" keyTimes="0;.1;.9;1" dur="11s" begin="2s" repeatCount="indefinite"/></circle>
    <circle cx="880" cy="0" r="2.6" opacity="0"><animate attributeName="cy" values="-10;660" dur="10s" begin="4s" repeatCount="indefinite"/><animate attributeName="cx" values="880;915;880" dur="10s" begin="4s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;.55;.55;0" keyTimes="0;.1;.9;1" dur="10s" begin="4s" repeatCount="indefinite"/></circle>
    <circle cx="1130" cy="0" r="2" opacity="0"><animate attributeName="cy" values="-10;660" dur="12s" begin="1s" repeatCount="indefinite"/><animate attributeName="cx" values="1130;1100;1130" dur="12s" begin="1s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;.45;.45;0" keyTimes="0;.1;.9;1" dur="12s" begin="1s" repeatCount="indefinite"/></circle>
  </g>

  <!-- TEMP CURVE PANEL: the defrost-vs-door pair -->
  <g>
    <rect x="620" y="96" width="596" height="168" rx="14" fill="#131D31" stroke="#EDF6FD" stroke-opacity=".1"/>
    <!-- safe band 2-8°C -->
    <rect x="636" y="150" width="564" height="52" rx="6" fill="#34D399" opacity=".08"/>
    <text x="640" y="162" class="mono" font-size="12" fill="#8FA3BC" opacity=".8">8°C</text>
    <text x="640" y="198" class="mono" font-size="12" fill="#8FA3BC" opacity=".8">2°C</text>
    <!-- curve draws itself: defrost bump (benign) then door spike (critical) -->
    <path d="M636 178 C 690 178 700 132 738 132 C 776 132 776 178 830 178 L 940 178 C 980 178 990 116 1030 108 L 1070 100 C 1110 96 1150 128 1200 122"
          fill="none" stroke="#38BDF8" stroke-width="3.5" stroke-linecap="round" pathLength="100" stroke-dasharray="100" stroke-dashoffset="100">
      <animate attributeName="stroke-dashoffset" values="100;0;0" keyTimes="0;.45;1" dur="7s" repeatCount="indefinite"/>
    </path>
    <!-- verdicts appear as the curve passes -->
    <g opacity="0"><animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;.2;.3;.95;1" dur="7s" repeatCount="indefinite"/>
      <rect x="676" y="220" width="126" height="26" rx="13" fill="none" stroke="#34D399" stroke-opacity=".7"/>
      <text x="739" y="238" class="mono" font-size="13" fill="#34D399" text-anchor="middle">defrost · benign</text>
    </g>
    <g opacity="0"><animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;.5;.6;.95;1" dur="7s" repeatCount="indefinite"/>
      <rect x="962" y="220" width="150" height="26" rx="13" fill="none" stroke="#F87171"/>
      <text x="1037" y="238" class="mono" font-size="13" fill="#F87171" text-anchor="middle">door ajar · ALARM</text>
      <circle cx="1032" cy="108" r="7" fill="#F87171"><animate attributeName="r" values="5;9;5" dur="1s" repeatCount="indefinite"/></circle>
    </g>
    <text x="636" y="86" class="mono" font-size="13" letter-spacing="2" fill="#8FA3BC">LIVE CURVE · SAME SPIKE, DIFFERENT VERDICT</text>
  </g>

  <!-- kicker -->
  <g opacity="0"><animate attributeName="opacity" from="0" to="1" dur=".6s" begin=".1s" fill="freeze"/>
    <text x="64" y="92" class="mono" font-size="15" letter-spacing="4" fill="#A5F3FC">QWEN CLOUD // TRACK 5 · EDGEAGENT</text>
  </g>

  <!-- title -->
  <g opacity="0" transform="translate(0 26)">
    <animate attributeName="opacity" from="0" to="1" dur=".9s" begin=".25s" fill="freeze"/>
    <animateTransform attributeName="transform" type="translate" values="0 26;0 0" dur=".9s" begin=".25s" fill="freeze" calcMode="spline" keySplines=".22 1 .36 1" keyTimes="0;1"/>
    <text x="58" y="208" class="disp" font-size="106" font-weight="800" letter-spacing="-3" fill="#38BDF8" filter="url(#pblur14)" opacity=".55">Permafrost<animate attributeName="opacity" values=".35;.7;.35" dur="3.4s" repeatCount="indefinite"/></text>
    <text x="58" y="208" class="disp" font-size="106" font-weight="800" letter-spacing="-3" fill="url(#pbrand)">Permafrost</text>
  </g>

  <!-- tagline -->
  <g opacity="0"><animate attributeName="opacity" from="0" to="1" dur=".8s" begin=".55s" fill="freeze"/>
    <text x="64" y="262" class="disp" font-size="24" fill="#8FA3BC">The $60 vaccine-fridge guardian that <tspan fill="#EDF6FD" font-weight="600">reasons</tspan></text>
    <text x="64" y="296" class="disp" font-size="24" fill="#8FA3BC">before it screams — and keeps guarding offline.</text>
  </g>

  <!-- metric -->
  <g opacity="0"><animate attributeName="opacity" from="0" to="1" dur=".8s" begin=".85s" fill="freeze"/>
    <text x="62" y="386" class="disp" font-size="76" font-weight="800" fill="#38BDF8" filter="url(#pblur3)" opacity=".6">$60<animate attributeName="opacity" values=".4;.8;.4" dur="2.6s" repeatCount="indefinite"/></text>
    <text x="62" y="386" class="disp" font-size="76" font-weight="800" fill="#EDF6FD">$60</text>
    <text x="222" y="360" class="mono" font-size="16" fill="#8FA3BC">edge guardian, total</text>
    <text x="222" y="384" class="mono" font-size="16" fill="#A5F3FC">vs $3,000/yr monitoring</text>
  </g>

  <!-- features -->
  <g class="disp" font-size="18" fill="#EDF6FD" opacity="0"><animate attributeName="opacity" from="0" to="1" dur=".8s" begin="1.1s" fill="freeze"/>
    <text x="64" y="446"><tspan fill="#38BDF8">◆</tspan>  Engineer-grade excursion diagnosis, CDC-cited</text>
    <text x="64" y="480"><tspan fill="#38BDF8">◆</tspan>  Cloud distills its own signed offline rules (vN+1)</text>
    <text x="64" y="514"><tspan fill="#38BDF8">◆</tspan>  Tamper-evident cold-chain log through blackouts</text>
  </g>

  <!-- edge-cloud loop diagram -->
  <g>
    <path d="M632 400 H1216" stroke="#38BDF8" stroke-opacity=".28" stroke-width="2" stroke-dasharray="8 7" fill="none">
      <animate attributeName="stroke-dashoffset" values="0;-30" dur="1.1s" repeatCount="indefinite"/>
    </path>
    <circle r="5" fill="#A5F3FC" filter="url(#pblur3)"><animateMotion dur="2.6s" repeatCount="indefinite" path="M632 400 H1216"/></circle>
    <g class="mono" font-size="14" text-anchor="middle">
      <rect x="620" y="374" width="122" height="52" rx="12" fill="#131D31" stroke="#A5F3FC" stroke-opacity=".6"/>
      <text x="681" y="405" fill="#A5F3FC">SENSORS</text>
      <rect x="766" y="374" width="150" height="52" rx="12" fill="#131D31" stroke="#EDF6FD" stroke-opacity=".22"/>
      <text x="841" y="405" fill="#EDF6FD">REFLEX &lt;100ms</text>
      <rect x="940" y="374" width="132" height="52" rx="12" fill="#131D31" stroke="#38BDF8" stroke-opacity=".8"><animate attributeName="stroke-opacity" values=".5;1;.5" dur="2s" repeatCount="indefinite"/></rect>
      <text x="1006" y="405" fill="#38BDF8">DIAGNOSE</text>
      <rect x="1096" y="374" width="120" height="52" rx="12" fill="#131D31" stroke="#38BDF8"/>
      <text x="1156" y="405" fill="#EDF6FD">SIREN+LOG</text>
    </g>
    <g class="mono" font-size="13">
      <rect x="923" y="330" width="293" height="30" rx="15" fill="none" stroke="#8FA3BC" stroke-opacity=".4" stroke-dasharray="5 5"/>
      <circle cx="943" cy="345" r="4" fill="#34D399"><animate attributeName="opacity" values="1;.3;1" dur="1.6s" repeatCount="indefinite"/></circle>
      <text x="959" y="350" fill="#8FA3BC">signed rules vN+1 · offline OK</text>
    </g>
  </g>

  <!-- pills -->
  <g class="mono" font-size="13" opacity="0"><animate attributeName="opacity" from="0" to="1" dur=".8s" begin="1.35s" fill="freeze"/>
    <rect x="64" y="574" width="141" height="30" rx="15" fill="#131D31" stroke="#EDF6FD" stroke-opacity=".14"/><circle cx="82" cy="589" r="3.5" fill="#38BDF8"/><text x="94" y="594" fill="#8FA3BC">qwen3.7-plus</text>
    <rect x="217" y="574" width="181" height="30" rx="15" fill="#131D31" stroke="#EDF6FD" stroke-opacity=".14"/><circle cx="235" cy="589" r="3.5" fill="#38BDF8"/><text x="247" y="594" fill="#8FA3BC">text-embedding-v4</text>
    <rect x="410" y="574" width="117" height="30" rx="15" fill="#131D31" stroke="#EDF6FD" stroke-opacity=".14"/><circle cx="428" cy="589" r="3.5" fill="#38BDF8"/><text x="440" y="594" fill="#8FA3BC">qwen3-tts</text>
    <rect x="539" y="574" width="141" height="30" rx="15" fill="#131D31" stroke="#EDF6FD" stroke-opacity=".14"/><circle cx="557" cy="589" r="3.5" fill="#38BDF8"/><text x="569" y="594" fill="#8FA3BC">Raspberry Pi</text>
    <rect x="692" y="574" width="125" height="30" rx="15" fill="#131D31" stroke="#EDF6FD" stroke-opacity=".14"/><circle cx="710" cy="589" r="3.5" fill="#38BDF8"/><text x="722" y="594" fill="#8FA3BC">Alibaba FC</text>
    <rect x="829" y="574" width="101" height="30" rx="15" fill="#131D31" stroke="#EDF6FD" stroke-opacity=".14"/><circle cx="847" cy="589" r="3.5" fill="#38BDF8"/><text x="859" y="594" fill="#8FA3BC">Ed25519</text>
    <g text-anchor="end"><text x="1216" y="594" fill="#8FA3BC" opacity=".8">PULL THE CABLE · STILL PROTECTING</text></g>
  </g>

  <!-- aurora sweep -->
  <rect x="-160" y="0" width="120" height="640" fill="#A5F3FC" opacity=".04" transform="skewX(-12)">
    <animate attributeName="x" values="-200;1400" dur="6s" repeatCount="indefinite"/>
  </rect>
</svg>
