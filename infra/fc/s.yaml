# Serverless Devs (s.yaml) — Permafrost cloud brain on Alibaba Function Compute 3.0
#
# The brain is an ASGI FastAPI app (permafrost.cloud.app); we run it on FC's
# Custom Runtime and front it with an HTTP trigger. Deploy:
#
#     npm i -g @serverless-devs/s          # the `s` CLI
#     s config add                         # Alibaba Cloud AK/SK
#     export DASHSCOPE_API_KEY=...         # live Qwen (optional; FakeQwen otherwise)
#     export PERMAFROST_SIGNING_SEED=...   # Ed25519 seed (hex) — bundle/root signer
#     export PERMAFROST_SEALING_PRIVATE=... # X25519 private (hex) — opens ECIES batches
#     s deploy
#
# Secrets are read from the deploy environment and injected as function env vars;
# private keys are NEVER committed (the edge ships only the public verify key).
# Capture the proof afterwards per PROOF.md.

edition: 3.0.0
name: permafrost-cloud
access: default

vars:
  region: ap-southeast-1            # intl region matching the DashScope-intl endpoint
  service: permafrost

resources:
  brain:
    component: fc3
    props:
      region: ${vars.region}
      functionName: permafrost-brain
      description: "Permafrost cold-chain diagnosis/distill/report brain (Qwen Cloud)"
      runtime: custom.debian10        # Custom Runtime: we run uvicorn ourselves
      cpu: 0.35
      memorySize: 512
      diskSize: 512
      timeout: 60
      instanceConcurrency: 5
      code: ./                        # packaged: infra/fc/bootstrap + the installed pkg
      customRuntimeConfig:
        # FC starts this; it launches uvicorn on $FC_SERVER_PORT and serves the ASGI app
        command:
          - python
          - -m
          - infra.fc.handler
        port: 9000
      environmentVariables:
        PERMAFROST_LIVE: "1"
        DASHSCOPE_API_KEY: ${env.DASHSCOPE_API_KEY}
        PERMAFROST_SIGNING_SEED: ${env.PERMAFROST_SIGNING_SEED}
        PERMAFROST_SEALING_PRIVATE: ${env.PERMAFROST_SEALING_PRIVATE}
      triggers:
        - triggerName: http
          triggerType: http
          triggerConfig:
            authType: anonymous       # /diagnose auth is the ECIES seal, not a gateway key
            methods:
              - GET
              - POST

# OSS archive target for signed daily Merkle roots + sealed batches (second Alibaba
# surface). Bucket is provisioned out-of-band; the app writes signed roots here in
# production (edge `sign_daily_roots` -> upload). Referenced by PROOF.md.
#   oss://permafrost-coldchain/roots/<fridge_id>/<YYYY-MM-DD>.json
