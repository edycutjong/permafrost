# Serverless Devs (s.yaml) — Permafrost on Alibaba Function Compute 3.0.
#
# MANAGED python3.10 runtime (no container / no ACR / no real-name verification).
# infra/fc/wsgi.py is an EVENT handler (FC 3.0 delivers the HTTP request as JSON
# and expects a {statusCode, headers, body} dict back). Permafrost stays offline
# on FakeQwen here (no PERMAFROST_LIVE / DASHSCOPE_API_KEY), so every route is
# deterministic + keyless.
#
#   s build --use-docker   # installs requirements.txt under code/python
#   s deploy               # zips code, creates the fn + anonymous HTTP trigger
#
# Endpoints (anonymous HTTP trigger):
#   GET /health   liveness
#   GET /verify   offline graceful-degradation proof (door_ajar fixture)
#   GET /run      one deterministic offline replay (?curve=...)

edition: 3.0.0
name: permafrost-fc
access: default

vars:
  region: ap-southeast-1

resources:
  permafrost:
    component: fc3
    props:
      region: ${vars.region}
      functionName: permafrost
      description: "Permafrost — auditable cold-chain edge brain (Qwen Cloud)"
      runtime: python3.10
      handler: infra.fc.wsgi.handler
      cpu: 0.35
      memorySize: 512
      diskSize: 512
      timeout: 60
      instanceConcurrency: 5
      # code root = the build dir (this file lives in infra/fc/).
      code: ../../
      environmentVariables:
        # s build installs requirements.txt deps under /code/python
        PYTHONPATH: /code/python
      triggers:
        - triggerName: http
          triggerType: http
          triggerConfig:
            authType: anonymous
            methods:
              - GET
              - POST
